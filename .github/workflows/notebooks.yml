name: Refresh notebooks

on:
  # We run this for all changes on alpha-doc while we are still iterating on the notebooks.
  # With the alpha-doc branch merged, this could be removed entirely or changed to a different trigger.
  push:
    branches:
      - alpha-doc
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-notebooks:
    runs-on: ubuntu-latest
    name: Refresh documentation notebooks

    defaults:
      run:
        # Conda requires a login shell in order to work properly
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create Helios dev environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          auto-activate-base: false
          activate-environment: helios-dev
          environment-file: environment-dev.yml
          python-version: "3.13"
          miniconda-version: "latest"

      - name: Install Conda GCC
        run: |
          conda install -y -c conda-forge gcc gxx

      - name: Install notebook execution dependencies
        run: |
          conda install -y -c conda-forge ipykernel nbconvert

      - name: Install Helios
        run: |
          python -m pip install --no-build-isolation --config-settings=cmake.build-type="Release" --config-settings=build-dir="build" -v -e .
        env:
          SETUPTOOLS_SCM_SUBPROCESS_TIMEOUT: "120"

      - name: Rerun notebooks
        working-directory: doc
        run: |
          jupyter nbconvert --to notebook --execute --inplace --ExecutePreprocessor.timeout=1200 *.ipynb

      - name: Commit notebook updates
        run: |
          if git diff --quiet -- doc/*.ipynb; then
            echo "No notebook changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add doc/*.ipynb
          git commit -m "Refresh documentation notebooks"
          git push origin HEAD:${{ github.ref_name }}
